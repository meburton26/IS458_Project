<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Account</title>
    <link href="account.css" rel="stylesheet" />
  </head>

  <script>
    function createAccount() {
      var name = document.getElementById("inputName").value;
      var email = document.getElementById("inputEmail").value;
      var plan = document.getElementById("inputPlan").value;
      var date = new Date().toLocaleDateString();

      // YouTube & W3Schools
      localStorage.setItem("name", name);
      localStorage.setItem("email", email);
      localStorage.setItem("plan", plan);
      localStorage.setItem("date", date);

      document.getElementById("name").innerHTML = name;
      document.getElementById("email").innerHTML = email;
      document.getElementById("plan").innerHTML = plan;
      document.getElementById("date").innerHTML = date;
    }

    // YouTube & W3Schools
    window.onload = function () {
      document.getElementById("name").innerHTML =
        localStorage.getItem("name") || "-";
      document.getElementById("email").innerHTML =
        localStorage.getItem("email") || "-";
      document.getElementById("plan").innerHTML =
        localStorage.getItem("plan") || "-";
      document.getElementById("date").innerHTML =
        localStorage.getItem("date") || "-";
    };

    function toggleMenu() {
      const nav = document.getElementById("navWrapper");
      nav.classList.toggle("active");
    }
  </script>

  <body>
    <header>
      <div class="logo-container">
        <a href="home.html">
          <img src="./images/NXP.png" alt="NextPLay Logo" />
        </a>
      </div>

      <div class="hamburger" onclick="toggleMenu()">
        <span></span>
        <span></span>
        <span></span>
      </div>

      <div class="nav-wrapper" id="navWrapper">
        <nav class="nav-group left">
          <ul>
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><a href="player_insights.html">Player Insights</a></li>
            <li><a href="matchup.html">Matchups</a></li>
            <li><a href="trends.html">Trends</a></li>
          </ul>
        </nav>
        <nav class="nav-group right">
          <ul>
            <li><a href="metrics.html">Quick Metrics</a></li>
            <li><a href="news.html">News</a></li>
            <li><a href="account.html">My Account</a></li>
            <li><a href="help.html">Help</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <!--Account Content -->
    <section class="account-container">
      <div class="account-card">
        <h2>My Account</h2>

        <input id="inputName" type="text" placeholder="Enter Name" />
        <input id="inputEmail" type="email" placeholder="Enter Email" />

        <select id="inputPlan">
          <option value="Free">Free Plan</option>
          <option value="Pro">Pro Plan</option>
          <option value="Elite">Elite Plan</option>
        </select>

        <button onclick="createAccount()" class="btn-custom">
          Create Account
        </button>

        <div class="account-info">
          <p>Name: <span id="name"></span></p>
          <p>Email:<span id="email"></span></p>
          <p>Plan: <span id="plan"></span></p>
          <p>Member Since: <span id="date"></span></p>
        </div>

        <button class="btn-custom">Edit Profile</button>
        <button class="btn-custom">Manage Subscription</button>
        <button class="btn-custom">Log Out</button>
      </div>
    </section>

    <footer>
      <p>&copy; 2026 NextPlay (NXP) | Sports Analytics Dashboard</p>
    </footer>
  </body>
</html>
