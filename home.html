<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <title>Home</title>
  </head>
  <body>
    <style>
      .main-header {
        background: linear-gradient(to right, #1b263b, #415a77);
        color: white;
        text-align: center;
        padding: 20px;
      }
      .main-header h1 {
        margin: 0;
        font-size: 28px;
      }
      .main-header p {
        margin: 5px 0 0;
        font-size: 14px;
        opacity: 0.8;
      }
      .navbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        background-color: #1f1f1f;
        padding: 12px;
        font-family: Arial, Helvetica, sans-serif;
      }
      .logo {
        color: #fff;
        font-size: 24px;
        font-weight: bold;
      }
      .nav-links {
        list-style: none;
        display: flex;
        gap: 20px;
        margin: 0px;
        padding: 0px;
      }
      .nav-links li a {
        text-decoration: none;
        color: #fff;
        font-size: 16px;
        transition: color 0.3s;
      }
      .nav-links li a:hover {
        color: #ff6f61;
      }
    </style>
    <header class="main-header">
      <div class="top-header">
        <h1>NextPlay (NXP)</h1>
        <p>Your all-in-one sports analytics dashboard</p>
      </div>
      <nav class="navbar">
        <div class="logo">NXP</div>
        <ul class="nav-links" id="navLinks">
          <li><a href="dashboard.html">Dashboard</a></li>
          <li><a href="player_insights.html">Player Insights</a></li>
          <li><a href="matchup.html">Matchups</a></li>
          <li><a href="trends.html">Trends</a></li>
          <li><a href="metrics.html">Quick Metrics</a></li>
          <li><a href="news.html">News</a></li>
          <li><a href="account.html">My Account</a></li>
          <li><a href="help.html">Help</a></li>
        </ul>
        <div class="right-section">
          <input type="text" placeholder="Search..." class="search-bar" />
          <div class="menu-toggle" id="menuToggle">☰</div>
        </div>
      </nav>
    </header>
  </body>
</html>
